version: '3.8'

services:
  app:
    build: .
    container_name: job-portal-backend

    ports:
      - "${PORT}:${PORT}"

    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${PORT}

    restart: always